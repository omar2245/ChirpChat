name: MongoDB Keepalive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl --fail --silent --show-error \
            -H "x-keepalive-secret: ${{ secrets.KEEPALIVE_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/keepalive" > /dev/null
